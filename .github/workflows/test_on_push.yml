name: Run tests on push event
on:
  push:
    # Triggered by a push event on the following branches
    branches: [ 3_12 ]
    # Triggered by a tag that starts with "v"
    tags: [ v* ]
  # Triggered by any pull requests
  pull_request: ~

jobs:
  run_tests:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
           python-version: [ "3.8" ]
           # python-version: [ "3.8", "3.9", "3.10", "3.11", "3.12", "3.13" ]
    steps:
      # Checkout the code from the following branch
      - uses: actions/checkout@v2

      # Set up the Python environment (different versions) on the virtual machine
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --with dev
          pip list

      - name: Run tests
        run: poetry run pytest -v ./tests

#      - name: Run pylint
#        run: pylint vhelpers tests
#      - name: mypy
#        run: mypy --namespace-packages --explicit-package-bases fortigate_api tests
#      - name: coverage
#        run: pytest --cov=tests
      - name: pydocstyle
        run: pydocstyle .
      - name: rst-lint
        run: rst-lint README.rst CHANGELOG.rst
